<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Vendas Online</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Novo Pedido</h1>

      <form id="orderForm" novalidate>
        <label for="customerName">Cliente</label>
        <input id="customerName" name="customerName" type="text" required />

        <label for="grossTotal">Total bruto (R$)</label>
        <input id="grossTotal" name="grossTotal" type="number" min="0" step="0.01" required />

        <section id="recurringSection" class="recurring-block">
          <div class="checkbox-row">
            <input id="recurringEnabled" name="recurringEnabled" type="checkbox" />
            <label for="recurringEnabled">Ativar recorrência</label>
          </div>

          <div id="recurringFields" class="hidden">
            <label for="discountPercent">Desconto (%)</label>
            <input id="discountPercent" name="discountPercent" type="number" step="0.01" />
            <p class="helper">Limites permitidos: <span id="discountRangeLabel"></span>.</p>

            <label for="nextBillingDate">Próximo faturamento</label>
            <input id="nextBillingDate" name="nextBillingDate" type="date" />
          </div>
        </section>

        <div class="actions">
          <button type="button" id="previewButton">Mostrar resumo</button>
          <button type="submit" id="saveButton">Salvar pedido</button>
        </div>
      </form>

      <section id="summaryPanel" class="summary hidden" aria-live="polite"></section>
      <section id="confirmationPanel" class="confirmation hidden" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
